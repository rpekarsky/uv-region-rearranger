name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploys for the same ref; only the latest commit on main
# should ship.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Inject analytics
        env:
          ANALYTICS_SCRIPT: ${{ vars.ANALYTICS_SCRIPT }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const script = process.env.ANALYTICS_SCRIPT || '';
          if (!script) {
            console.log('ANALYTICS_SCRIPT not set, skipping');
            process.exit(0);
          }
          const path = 'dist/index.html';
          const content = fs.readFileSync(path, 'utf8');
          fs.writeFileSync(path, content.replace('<!-- analytics -->', script));
          console.log('Analytics injected');
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
